server:
  port: 8080

app:
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
    expiration-ms: 3600000
    pepper: "s3cur3P3pp3r!"
  external-api:
    base-url: http://localhost:8080/external/v1

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,circuitbreakers,ratelimiters
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      externalApi:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  ratelimiter:
    instances:
      externalApi:
        limit-for-period: 10
        limit-refresh-period: 10s
        timeout-duration: 0s
  retry:
    instances:
      externalApi:
        max-attempts: 2
        wait-duration: 500ms
        retry-exceptions:
          - com.example.gateway.exception.ExternalApiException
  timelimiter:
    instances:
      externalApi:
        timeout-duration: 3s
