server:
  port: 8080

app:
  name: todo-list
  version: 1.0.0

spring:
  profiles:
    active: dev

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: DEBUG
    com.example.todolist: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

server:
  port: 80

logging:
  level:
    root: WARN
    com.example.todolist: INFO
